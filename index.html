    <script>
      (function () {
        var consented = localStorage.getItem("cookie-consent") === "accepted";
        var stored = consented ? localStorage.getItem("theme") : null;
        var dark =
          stored === "dark" ||
          (stored !== "light" &&
            window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
